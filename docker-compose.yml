volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  hardhat_cache:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    container_name: wishlive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wishlive
      POSTGRES_PASSWORD: wishlive_dev
      POSTGRES_DB: wishlive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wishlive"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wishlive-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  hardhat:
    build:
      context: ./docker/hardhat
    container_name: wishlive-hardhat
    restart: unless-stopped
    ports:
      - "8545:8545"
    volumes:
      - hardhat_cache:/app/cache
    environment:
      HARDHAT_CHAIN_ID: "31337"
    command: ["npx", "hardhat", "node", "--hostname", "0.0.0.0", "--port", "8545"]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8545',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',id:1,method:'eth_chainId',params:[]})}).then(r=>r.json()).then(j=>process.exit(j.result==='0x7a69'?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
